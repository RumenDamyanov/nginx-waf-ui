name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag (e.g. v0.1.0) to build'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }

    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Set version
        id: version
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          make build VERSION=${{ steps.version.outputs.version }}
          mv nginx-waf-ui nginx-waf-ui_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}

      - name: Package artifact
        run: |
          FN=nginx-waf-ui_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}
          mkdir -p pkg
          cp LICENSE.md README.md CHANGELOG.md pkg/
          cp conf/config.example.yaml pkg/
          cp dist/nginx-waf-ui.service pkg/
          cp $FN pkg/nginx-waf-ui
          tar czf ${FN}.tar.gz -C pkg .
          sha256sum ${FN}.tar.gz > ${FN}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.tar.gz
            *.sha256

  publish:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: nginx-waf-ui ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
